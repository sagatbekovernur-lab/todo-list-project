<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>To-Do App</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    padding-top: 50px;
}

.container {
    width: 400px;
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
}

input {
    width: 70%;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}

.add {
    background: #22c55e;
    color: white;
}

li {
    background: #334155;
    margin-top: 10px;
    padding: 10px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
}
</style>
</head>

<body>

<div class="container">
    <h2>To-Do App</h2>

    <input id="taskInput" type="text" placeholder="Task жаз...">
    <button class="add" onclick="addTask()">Add</button>

    <ul id="list"></ul>
</div>

<script>
let list = document.getElementById("list");
let input = document.getElementById("taskInput");

function addTask() {
    if (input.value.trim() === "") return;

    let li = document.createElement("li");
    li.textContent = input.value;

    let del = document.createElement("button");
    del.textContent = "❌";
    del.onclick = function () {
        li.remove();
    };

    li.appendChild(del);
    list.appendChild(li);

    input.value = "";
}

// ✅ ENTER дұрыс жұмыс істейтін жер
input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        addTask();
    }
});
</script>

</body>
</html>
